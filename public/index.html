<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>🎧 Serv - itor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <button id="account-btn" onclick="window.location.href='/account'">👤 My account</button>
      <button id="downloads-btn">⬇️ My downloads</button>
    </nav>
  </header>

  <main>
    <!-- Download bar -->
    <section id="download-bar">
      <input type="text" id="youtube-url" placeholder="🎥 Past a YouTube link...">
      <input type="text" id="target-playlist" placeholder="📁 Playlist name...">
      <button id="download-btn">⬇️ Download</button>
      <span id="download-status"></span>
    </section>

    <!-- Playlist creation -->
    <section id="playlist-controls">
      <input type="text" id="new-playlist-name" placeholder="➕ New playlist">
      <button id="create-playlist-btn">Create</button>
    </section>

    <!-- Playlists list -->
    <section id="view-playlists" class="view hidden">
      <h1>🎵 Your Playlists</h1>
      <div id="playlists" class="grid"></div>
    </section>

    <!-- Playlist pist -->
    <section id="view-tracks" class="view hidden">
      <button id="back">← Back</button>
      <h2 id="playlist-title"></h2>
      <div id="tracks" class="grid"></div>
    </section>

    <!-- Downloads -->
    <section id="view-downloads" class="view hidden">
      <button id="back-from-downloads">← Back</button>
      <h2>⬇️ Downloads</h2>
      <ul id="downloads-list"></ul>
    </section>
  </main>

  <footer>
    <div id="player" class="collapsed">
      <div id="player-main">
        <img id="player-cover" src="" alt="Pochette">
        <div class="track-info">
          <div id="track-title">Title</div>
          <div id="track-playlist">Playlist</div>
        </div>
          <div class="controls">
          <button id="play-pause">▶️</button>
          <button id="loop-btn">🔁</button>
          <button id="toggle-size">▲</button>
        </div>
        <audio id="audio"></audio>
      </div>

      <div id="player-expanded">
        <div id="progress">
          <span id="current">0:00</span>
          <input type="range" id="seek" min="0" step="1" value="0">
          <span id="duration">0:00</span>
        </div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
